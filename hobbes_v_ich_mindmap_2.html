const nm = {};

function nc(n) { return { x: n.x + n.w/2, y: n.y + n.h/2 }; }

function exitEntry(fn, tn) {
  const fc = nc(fn), tc = nc(tn);
  const dx = tc.x - fc.x, dy = tc.y - fc.y;
  let p1, p2;
  if (Math.abs(dx) >= Math.abs(dy)) {
    if (dx >= 0) { p1={x:fn.x+fn.w,y:fc.y}; p2={x:tn.x,y:tc.y}; }
    else         { p1={x:fn.x,y:fc.y};       p2={x:tn.x+tn.w,y:tc.y}; }
  } else {
    if (dy >= 0) { p1={x:fc.x,y:fn.y+fn.h}; p2={x:tc.x,y:tn.y}; }
    else         { p1={x:fc.x,y:fn.y};       p2={x:tc.x,y:tn.y+tn.h}; }
  }
  return { p1, p2 };
}

function bezPath(p1, p2) {
  const dx = Math.abs(p2.x-p1.x), dy = Math.abs(p2.y-p1.y);
  const mx = (p1.x+p2.x)/2, my = (p1.y+p2.y)/2;
  if (dx >= dy) return `M${p1.x} ${p1.y} C${mx} ${p1.y} ${mx} ${p2.y} ${p2.x} ${p2.y}`;
  return `M${p1.x} ${p1.y} C${p1.x} ${my} ${p2.x} ${my} ${p2.x} ${p2.y}`;
}

  path.setAttribute('d', bezPath(p1, p2));
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', edgeCol(tn.cat));
  path.setAttribute('stroke-width', fid === 'hub' ? '2' : '1.5');
  path.setAttribute('opacity', fid === 'hub' ? '0.55' : '0.38');
  root.appendChild(path);
  const key = fid + '|' + tid;
  edgeElems[key] = path;
  // Track which branch owns this edge
  const branchId = tn.parent || (tn.branch ? null : fid);
  if (branchId && nm[branchId] && nm[branchId].branch) {
    if (!branchEdgeMap[branchId]) branchEdgeMap[branchId] = [];
    branchEdgeMap[branchId].push(key);
  }
  if (fid.startsWith('b-')) {
    if (!branchEdgeMap[fid]) branchEdgeMap[fid] = [];
    branchEdgeMap[fid].push(key);
  }
});

// Cross edges
crossEdges.forEach(ce => {
  const fn = nm[ce.f], tn = nm[ce.t];
  if (!fn || !tn) return;
  const { p1, p2 } = exitEntry(fn, tn);
  const path = document.createElementNS(NS, 'path');
  path.setAttribute('d', bezPath(p1, p2));
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', '#94a3b8');
  path.setAttribute('stroke-width', '1.2');
  path.setAttribute('stroke-dasharray', '5,4');
  path.setAttribute('opacity', '0.28');
  root.appendChild(path);
  crossEdgeElems.push({ path, f: ce.f, t: ce.t });
});

// Nodes
const tip = document.getElementById('tip');

nodes.forEach(node => {
  const pal = PAL[node.cat] || PAL['contract'];
  const isBranch = !!node.branch;
  const g = document.createElementNS(NS, 'g');
  g.setAttribute('style', 'cursor:pointer');
  g.setAttribute('transform', `translate(${node.x},${node.y})`);

  const rect = document.createElementNS(NS, 'rect');
  rect.setAttribute('width', node.w);
  rect.setAttribute('height', node.h);
  rect.setAttribute('rx', node.rx || 6);
  rect.setAttribute('fill', pal.fill);
  rect.setAttribute('stroke', pal.stroke);
  rect.setAttribute('stroke-width', pal.sw || 1.5);
  if (pal.glow) rect.setAttribute('filter', `url(#${pal.glow})`);
  rect.style.transition = 'filter 0.15s';
  g.appendChild(rect);

  // Text
  const lines = node.lines || [];
  const fz = node.cat === 'center' ? 14.5 : isBranch ? 11 : 11.5;
  const lh = fz * 1.42;
  const totalH = lines.length * lh;
  const baseY = node.h/2 - totalH/2 + fz * 0.88;

  lines.forEach((line, i) => {
    const txt = document.createElementNS(NS, 'text');
    txt.setAttribute('x', node.w/2);
    txt.setAttribute('y', baseY + i * lh);
    txt.setAttribute('text-anchor', 'middle');
    txt.setAttribute('fill', pal.txt);
    txt.setAttribute('font-size', fz);
    txt.setAttribute('font-weight', i === 0 ? '600' : '400');
    txt.setAttribute('font-family', node.cat==='center' ? "'Playfair Display',serif" : "'Source Sans 3',sans-serif");
    txt.setAttribute('pointer-events', 'none');
    txt.textContent = line;
    g.appendChild(txt);
  });

  // Collapse indicator for branch nodes
  if (isBranch) {
    const badge = document.createElementNS(NS, 'text');
    badge.setAttribute('x', node.w - 8);
    badge.setAttribute('y', node.h/2 + 4);
    badge.setAttribute('text-anchor', 'middle');
    badge.setAttribute('fill', pal.txt);
    badge.setAttribute('font-size', '12');
    badge.setAttribute('font-weight', '600');
    badge.setAttribute('pointer-events', 'none');
    badge.setAttribute('id', 'badge-' + node.id);
    badge.textContent = '▾';
    g.appendChild(badge);
  }

  // Hover
  g.addEventListener('mouseenter', (e) => {
    rect.style.filter = 'brightness(1.35)';
    if (node.detail) {
      tip.innerHTML = `<strong>${node.lines.join(' — ')}</strong>${node.detail}`;
      tip.style.display = 'block';
    }
  });
  g.addEventListener('mousemove', (e) => {
    let x = e.clientX+15, y = e.clientY-12;
    if (x+330 > window.innerWidth) x = e.clientX - 334;
    if (y+200 > window.innerHeight) y = e.clientY - 180;
    tip.style.left = x+'px'; tip.style.top = y+'px';
  });
  g.addEventListener('mouseleave', () => {
    rect.style.filter = '';
    tip.style.display = 'none';
  });

  // Click: collapse/expand branch; show tooltip for leaves
  g.addEventListener('click', (e) => {
    e.stopPropagation();
    if (isBranch) {
      toggleBranch(node.id);
    }
  });

  root.appendChild(g);
  nodeElems[node.id] = g;
});

// ── Collapse/Expand ──────────────────────────────────────────────────────────
function toggleBranch(branchId, forceCollapse) {
  const node = nm[branchId];
  if (!node || !node.children) return;
  const isNowCollapsed = forceCollapse !== undefined ? !forceCollapse : !collapsed[branchId];
  collapsed[branchId] = isNowCollapsed;

  const vis = isNowCollapsed ? 'hidden' : 'visible';

  // Toggle child node groups
  node.children.forEach(childId => {
    if (nodeElems[childId]) nodeElems[childId].setAttribute('visibility', vis);
  });

  // Toggle branch→leaf edges
  (branchEdgeMap[branchId] || []).forEach(key => {
    if (edgeElems[key]) edgeElems[key].setAttribute('visibility', vis);
  });

  // Toggle cross edges where source or target is a child of this branch
  crossEdgeElems.forEach(({ path, f, t }) => {
    const fNode = nm[f], tNode = nm[t];
    const fHidden = fNode && fNode.parent && collapsed[fNode.parent];
    const tHidden = tNode && tNode.parent && collapsed[tNode.parent];
    path.setAttribute('visibility', (fHidden || tHidden) ? 'hidden' : 'visible');
  });

  // Update badge
  const badge = document.getElementById('badge-' + branchId);
  if (badge) badge.textContent = isNowCollapsed ? '▸' : '▾';
}

// Collapse all / Expand all
let allCollapsed = false;
document.getElementById('btn-collapse-all').addEventListener('click', () => {
  allCollapsed = !allCollapsed;
  nodes.filter(n => n.branch).forEach(n => toggleBranch(n.id, !allCollapsed));
  document.getElementById('btn-collapse-all').textContent = allCollapsed ? 'Expand All' : 'Collapse All';
});

// ── Zoom / Pan ───────────────────────────────────────────────────────────────
let scale = 0.72, tx = -200, ty = -60;
let dragging = false, dragStart = {x:0,y:0}, panStart = {tx:0,ty:0};

const canvas = document.getElementById('canvas');
const zoomLabel = document.getElementById('zoom-label');

function applyTransform() {
  root.setAttribute('transform', `translate(${tx},${ty}) scale(${scale})`);
  zoomLabel.textContent = Math.round(scale*100) + '%';
}

function zoomTo(newScale, cx, cy) {
  const clamp = Math.max(0.2, Math.min(3, newScale));
  tx = cx - (cx - tx) * (clamp / scale);
  ty = cy - (cy - ty) * (clamp / scale);
  scale = clamp;
  applyTransform();
}

// Initial fit
applyTransform();

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  zoomTo(scale * (e.deltaY > 0 ? 0.88 : 1.14), e.clientX - rect.left, e.clientY - rect.top);
}, { passive: false });

canvas.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  dragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  panStart = { tx, ty };
  canvas.classList.add('dragging');
});
window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  tx = panStart.tx + (e.clientX - dragStart.x);
  ty = panStart.ty + (e.clientY - dragStart.y);
  applyTransform();
});
window.addEventListener('mouseup', () => {
  dragging = false;
  canvas.classList.remove('dragging');
});

// Touch pan/zoom
let lastTouches = null;
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  lastTouches = e.touches;
  if (e.touches.length === 1) {
    dragging = true;
    dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    panStart = { tx, ty };
  }
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 2) {
    const d0 = Math.hypot(lastTouches[0].clientX-lastTouches[1].clientX, lastTouches[0].clientY-lastTouches[1].clientY);
    const d1 = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    const rect = canvas.getBoundingClientRect();
    const cx = (e.touches[0].clientX + e.touches[1].clientX)/2 - rect.left;
    const cy = (e.touches[0].clientY + e.touches[1].clientY)/2 - rect.top;
    zoomTo(scale * (d1/d0), cx, cy);
    lastTouches = e.touches;
  } else if (e.touches.length === 1 && dragging) {
    tx = panStart.tx + (e.touches[0].clientX - dragStart.x);
    ty = panStart.ty + (e.touches[0].clientY - dragStart.y);
    applyTransform();
  }
}, { passive: false });
canvas.addEventListener('touchend', () => { dragging = false; });

// Toolbar buttons
document.getElementById('btn-zin').addEventListener('click', () => {
  const r = canvas.getBoundingClientRect();
  zoomTo(scale * 1.25, r.width/2, r.height/2);
});
document.getElementById('btn-zout').addEventListener('click', () => {
  const r = canvas.getBoundingClientRect();
  zoomTo(scale * 0.8, r.width/2, r.height/2);
});
document.getElementById('btn-reset').addEventListener('click', () => {
  scale = 0.72; tx = -200; ty = -60;
  applyTransform();
});
</script>
</body>
